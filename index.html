
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio EDUCIT</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .user-card { border-bottom: 1px solid #ddd; padding: 10px 0; }
        .user-card:last-child { border-bottom: none; }
        
       /* Bug 1: El botón no toma los estilos por un error tipográfico */
     .btn-primary {
    background-color: #0056b3; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 20px;
}

        .search-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Directorio de Estudiantes EDUCIT</h2>
    
    <button class="btn-primary" onclick="loadUsers()">Cargar Usuarios</button>

    <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Buscar por nombre..."
        oninput="filterUsers()"
    >

    <div id="userList">Los usuarios aparecerán aquí...</div>
</div>

<script>
    // Tarea 3 (Lógica SQL): Corrige esta consulta para insertar un usuario.
    // Consulta actual: INSERT INTO estudiantes (nombre, correo) VALUES (userName);
    // Tu corrección: 
    //   INSERT INTO estudiantes (nombre, correo) VALUES (?, ?);
    //   -- Se ejecuta como consulta parametrizada (prepared statement),
    //   -- pasando [userName, userEmail] como parámetros en vez de
    //   -- concatenar las variables directamente en el string SQL.
    //   -- Esto corrige que faltaba el valor del correo y evita inyección SQL.
    

 let allUsers = [];

    function renderUsers(users) {
        const userList = document.getElementById('userList');

        if (users.length === 0) {
            userList.innerHTML = 'No se encontraron usuarios.';
            return;
        }

        userList.innerHTML = '';
        users.forEach(user => {
            const div = document.createElement('div');
            div.className = 'user-card';

            // Bug 2: corregido - la API devuelve "name" y "email".
            div.innerHTML = `<strong>${user.name}</strong> - ${user.email}`;

            userList.appendChild(div);
        });
    }

    function loadUsers() {
        const userList = document.getElementById('userList');
        userList.innerHTML = 'Cargando...';

        fetch('https://jsonplaceholder.typicode.com/users')
            .then(response => response.json())
            .then(users => {
                allUsers = users;
                renderUsers(allUsers);
            })
            .catch(error => {
                userList.innerHTML = 'Error al cargar los usuarios.';
                console.error(error);
            });
    }

    function filterUsers() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();

        const filtered = allUsers.filter(user =>
            user.name.toLowerCase().includes(query)
        );

        renderUsers(filtered);
    }
</script>

</body>
</html>
